services:
  windows:
    build: .
    image: radmin_on_linux:0.1
    container_name: windows
    environment:
      VERSION: "2019"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    device_cgroup_rules:
      - 'c *:* rwm'
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
      - ./shared:/shared
    restart: always
    stop_grace_period: 2m
    networks:
      _external:
        ipv4_address: 172.25.0.3
      _internal:
        ipv4_address: 26.0.0.2
networks:
  _external:
    name: radminvpn_external
    external: false
    driver: bridge
    driver_opts:
      gateway_mode_ipv4: nat
    ipam:
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.1
  _internal:
    name: windows_internal_network
    external: false
    driver: macvlan
    driver_opts:
      macvlan_mode: bridge
    ipam:
      config:
        - subnet: 26.0.0.0/16
          gateway: 26.0.0.1
